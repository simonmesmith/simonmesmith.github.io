---
layout: default
---

<article class="news">

  <h1>{{ page.title }}</h1>

  <div class="attributes">
    <ul>
      <li>Description: {{ page.description }}</li>
      <li>URL: <a href="{{ page.url }}">{{ page.url }}</a></li>
    </ul>
  </div>

  <div class="entry">
    {{ content }}
  </div>

  <h2>Comments</h2>

  {% include disqus.html %}

</article>
